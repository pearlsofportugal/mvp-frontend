<form [formGroup]="form" (ngSubmit)="onSubmit()">
  <div class="form-grid">
    <div class="form-group">
      <label for="site_key">Site *</label>
      <select 
        id="site_key"
        formControlName="site_key"
        (change)="onSiteChange($event)">
        @for (site of sites(); track site.id) {
          <option [value]="site.key" [attr.data-url]="site.base_url">
            {{ site.key }} — {{ site.name }}
          </option>
        }
      </select>
    </div>

    <div class="form-group full">
      <label for="start_url">Start URL *</label>
      <input 
        id="start_url"
        formControlName="start_url"
        type="url"
        placeholder="https://...">
    </div>

    <div class="form-group">
      <label for="max_pages">Max pages</label>
      <input 
        id="max_pages"
        formControlName="max_pages"
        type="number" 
        min="1" 
        max="100">
    </div>
  </div>

  <div class="btn-group">
    <button 
      type="submit"
      class="btn btn-success" 
      [disabled]="submitting()">
      @if (submitting()) {
        Processing...
      } @else {
        Launch Job
      }
    </button>
  </div>
</form>
