<div class="jobs-page">

  <header class="jobs-header">
    <div>
      <h1 class="jobs-title">Scrape Jobs</h1>
      <p class="jobs-subtitle">Launch and monitor real estate data scraping jobs</p>
    </div>
    <button class="btn btn-ghost btn-sm" type="button" (click)="onJobCreated()">
      <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
        <polyline points="23 4 23 10 17 10"/>
        <polyline points="1 20 1 14 7 14"/>
        <path d="M3.51 9a9 9 0 0114.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0020.49 15"/>
      </svg>
      Refresh
    </button>
  </header>

  <div class="jobs-layout">

    <aside class="card jobs-form-panel" aria-label="New job form">
      <h2>New Job</h2>
      <app-job-form [sites]="sites()" (jobCreated)="onJobCreated()" />
    </aside>

    <main class="jobs-main">
      @if (loading()) {
        <app-spinner size="lg" message="Loading jobs"></app-spinner>
      } @else {
        <app-jobs-list
          [jobs]="jobs()"
          (view)="onViewJob($event)"
          (cancel)="onCancelJob($event)"
          (delete)="onDeleteJob($event)"
        />
      }
      @if (selectedJob()) {
        <app-job-detail [job]="selectedJob()!" (close)="onCloseDetail()" />
      }
    </main>

  </div>

</div>

@if (confirmingCancelJobId()) {
  <app-confirm-dialog
    message="Cancel this job?"
    confirmLabel="Yes, cancel"
    cancelLabel="No"
    (confirmed)="onConfirmCancelJob()"
    (cancelled)="confirmingCancelJobId.set(null)"
  />
}

@if (confirmingDeleteJobId()) {
  <app-confirm-dialog
    message="Delete this job permanently?"
    confirmLabel="Delete"
    cancelLabel="Cancel"
    [danger]="true"
    (confirmed)="onConfirmDeleteJob()"
    (cancelled)="confirmingDeleteJobId.set(null)"
  />
}
