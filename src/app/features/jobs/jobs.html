<div class="card">
	<h2>Launch Scrape Job</h2>
	<app-job-form [sites]="sites()" (jobCreated)="onJobCreated()" />
</div>

<div class="card mt">
	<div class="flex-between">
		<h2>Recent Jobs</h2>
		<button class="btn btn-outline btn-sm" (click)="onJobCreated()">
			Refresh
		</button>
	</div>

	@if (loading()) {
	<p class="mt">Loading...</p>
	} @else {
	<app-jobs-list class="mt" [jobs]="jobs()" (view)="onViewJob($event)" (cancel)="onCancelJob($event)"
		(delete)="onDeleteJob($event)" />
	}
</div>

@if (selectedJob()) {
<div class="card mt">
	<app-job-detail [job]="selectedJob()!" (close)="onCloseDetail()" />
</div>
}

@if (confirmingCancelJobId()) {
  <app-confirm-dialog
    message="Cancelar este job?"
    confirmLabel="Sim, cancelar"
    cancelLabel="Não"
    (confirmed)="onConfirmCancelJob()"
    (cancelled)="confirmingCancelJobId.set(null)"
  />
}

@if (confirmingDeleteJobId()) {
  <app-confirm-dialog
    message="Apagar este job permanentemente?"
    confirmLabel="Apagar"
    cancelLabel="Cancelar"
    [danger]="true"
    (confirmed)="onConfirmDeleteJob()"
    (cancelled)="confirmingDeleteJobId.set(null)"
  />
}
