<form [formGroup]="filterForm" class="form-grid">
  <div class="form-group">
    <label>Source Partner</label>
    <select formControlName="source_partner">
      <option value="">All</option>
      @for (site of sites(); track site.key) {
        <option [value]="site.key">{{ site.name || site.key }}</option>
      }
    </select>
  </div>

  <div class="form-group">
    <label>Property Type</label>
    <input formControlName="property_type" placeholder="apartment" />
  </div>

  <div class="form-group">
    <label>District</label>
    <input formControlName="district" placeholder="Lisboa" />
  </div>

  <div class="form-group">
    <label>County</label>
    <input formControlName="county" placeholder="Cascais" />
  </div>

  <div class="form-group">
    <label>Minimum Price</label>
    <input formControlName="price_min" type="number" placeholder="0" />
  </div>

  <div class="form-group">
    <label>Maximum Price</label>
    <input formControlName="price_max" type="number" placeholder="500000" />
  </div>

  <div class="form-group">
    <label>Bedrooms</label>
    <input formControlName="bedrooms" type="number" placeholder="" />
  </div>

  <div class="form-group">
    <label>Minimum Area (m²)</label>
    <input formControlName="area_min" type="number" placeholder="0" />
  </div>

  <div class="form-group">
    <label>Maximum Area (m²)</label>
    <input formControlName="area_max" type="number" placeholder="500" />
  </div>
</form>

<div class="btn-group">
  <button class="btn btn-primary" (click)="onSearch()">Search</button>
  <button class="btn btn-outline" (click)="onViewStats()">Statistics</button>
</div>
