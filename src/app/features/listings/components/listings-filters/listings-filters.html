<div class="filter-bar" [formGroup]="filterForm">

  <div class="filter-group">
    <select class="filter-select" formControlName="source_partner">
      <option value="">All sources</option>
      @for (site of sites(); track site.key) {
        <option [value]="site.key">{{ site.name || site.key }}</option>
      }
    </select>
  </div>

  <div class="filter-group">
    <input class="filter-input" formControlName="property_type" placeholder="Type…" />
  </div>

  <div class="filter-group">
    <input class="filter-input" formControlName="district" placeholder="District…" />
  </div>

  <div class="filter-group">
    <input class="filter-input" formControlName="county" placeholder="County…" />
  </div>

  <div class="filter-group filter-group--range">
    <input class="filter-input filter-input--short" formControlName="price_min" type="number" placeholder="Min €" />
    <span class="filter-range-sep">–</span>
    <input class="filter-input filter-input--short" formControlName="price_max" type="number" placeholder="Max €" />
  </div>

  <div class="filter-group">
    <input class="filter-input filter-input--short" formControlName="bedrooms" type="number" placeholder="Beds" />
  </div>

  <div class="filter-actions">
    <button class="btn btn-primary btn-sm" type="button" (click)="onSearch()">Search</button>
    <button class="btn btn-ghost btn-sm" type="button" (click)="onClearFilters()">Clear</button>
  </div>

</div>
