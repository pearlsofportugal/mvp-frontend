<div class="listings-layout">
	<div class="card">
		<h2>Filters</h2>
		<app-listings-filters
			[sites]="activeSites()"
			(filtersChange)="onFiltersChange($event)"
			(viewStats)="onViewStatsRequest()"
		/>
	</div>

	@if (showStats()) {
		<div class="card">
			<div class="flex-between">
				<h2>Statistics</h2>
				<button class="btn btn-outline btn-sm" (click)="onCloseStats()">
					✕ Close
				</button>
			</div>
			<app-listings-stats [sourcePartner]="userFilters().source_partner" />
		</div>
	}

	<div class="card">
		<div class="flex-between">
			<h2>Real Estate ({{ totalListings() }})</h2>
			<div class="btn-group">
				<button
					class="btn btn-outline btn-sm"
					(click)="onPrevPage()"
					[disabled]="!hasPrevPage() || isLoadingListings()"
				>
					← Previous
				</button>
				<button
					class="btn btn-outline btn-sm"
					(click)="onNextPage()"
					[disabled]="!hasNextPage() || isLoadingListings()"
				>
					Next →
				</button>
			</div>
		</div>

		@if (isLoadingListings()) {
			<div class="empty">
				<div class="icon"></div>
				<p>Loading...</p>
			</div>
		} @else {
			<app-listings-table
				[realEstates]="realEstates()"
				[sortField]="sortField()"
				[sortOrder]="sortOrder()"
				(viewRealEstate)="onViewRealEstate($event)"
				(deleteRealEstate)="onDeleteRealEstate($event)"
				(sort)="onSort($event.field, $event.order)"
			/>
		}
	</div>

	@if (selectedRealEstate()) {
		<div class="card">
			<div class="flex-between">
				<h2>Real Estate Detail</h2>
				<button class="btn btn-outline btn-sm" (click)="onCloseDetail()">
					✕ Close
				</button>
			</div>
			<app-listing-detail
				[realEstate]="selectedRealEstate()!"
				(delete)="onDeleteRealEstate($event)"
			/>
		</div>
	}

	@if (confirmingDeleteListingId()) {
		<app-confirm-dialog
			message="Apagar este anúncio permanentemente?"
			confirmLabel="Apagar"
			cancelLabel="Cancelar"
			[danger]="true"
			(confirmed)="onConfirmDeleteListing()"
			(cancelled)="confirmingDeleteListingId.set(null)"
		/>
	}
</div>
