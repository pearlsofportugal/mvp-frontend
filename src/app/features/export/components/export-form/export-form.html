<form [formGroup]="form">
  <div class="form-grid">
    <div class="form-group">
      <label for="district">District</label>
      <input
        type="text"
        id="district"
        formControlName="district"
        placeholder="Lisbon"
      />
    </div>

    <div class="form-group">
      <label for="county">County</label>
      <input type="text" id="county" formControlName="county" placeholder="" />
    </div>

    <div class="form-group">
      <label for="property_type">Property Type</label>
      <input
        type="text"
        id="property_type"
        formControlName="property_type"
        placeholder="apartment"
      />
    </div>

    <div class="form-group">
      <label for="source_partner">Source Partner</label>
      <input
        type="text"
        id="source_partner"
        formControlName="source_partner"
        placeholder="pearls"
      />
    </div>

    <div class="form-group">
      <label for="price_min">Min. Price</label>
      <input
        type="number"
        id="price_min"
        formControlName="price_min"
        placeholder="0"
      />
    </div>

    <div class="form-group">
      <label for="price_max">Max. Price</label>
      <input
        type="number"
        id="price_max"
        formControlName="price_max"
        placeholder="500000"
      />
    </div>
  </div>

  <div class="btn-group">
    <button
      type="button"
      class="btn btn-primary"
      (click)="exportData('csv')"
    >
      CSV
    </button>
    <button
      type="button"
      class="btn btn-primary"
      (click)="exportData('json')"
    >
      JSON
    </button>
    <button
      type="button"
      class="btn btn-success"
      (click)="exportData('excel')"
    >
      Excel
    </button>
  </div>
</form>
