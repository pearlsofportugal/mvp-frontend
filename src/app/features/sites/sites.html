<div class="sites-page" [class.has-form]="showForm()">
  <div class="card card-generator">
    <div class="generator-header">
      <div class="generator-title-block">
        <span class="generator-eyebrow">Site Configuration</span>
        <h2 class="generator-title">Manage scraping sites</h2>
        <p class="generator-desc">
          Configure source websites, extraction mode, and selectors used by scraping jobs.
        </p>
      </div>

      <button class="btn btn-primary btn-sm" (click)="onShowCreateForm()">+ New Site</button>
    </div>

    @if (loading()) {
      <div class="state-loading">
        <div class="state-spinner"></div>
        <span>Loading sites...</span>
      </div>
    } @else {
      <app-site-list [sites]="sites()" (edit)="onEditSite($event)" (delete)="onDeleteSite($event)" (reactivate)="onReactivateSite($event)" (addSite)="onShowCreateForm()" />
    }
  </div>

  @if (showForm()) {
    <div class="card card-result">
      <app-site-form [site]="editingSite()" (success)="onFormSuccess()" (cancel)="onFormCancel()" />
    </div>
  }
</div>
