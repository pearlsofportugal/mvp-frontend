<div class="sites-page">
  <header class="page-header">
    <div>
      <h1 class="page-title">Scraping Sites</h1>
      <p class="page-subtitle">Configure source websites, extraction modes, and CSS selectors for scraping jobs.</p>
    </div>
    <button class="btn btn-primary btn-sm" (click)="onNewSite()">+ New Site</button>
  </header>

  <div class="card">
    @if (loading()) {
        <app-spinner size="md" message="Loading sites"></app-spinner>
    } @else {
      <app-site-list [sites]="sites()" [scheduleInfoMap]="scheduleInfoMap()" (edit)="onEditSite($event)" (delete)="onDeleteSite($event)" (addSite)="onNewSite()" />
    }
  </div>
</div>
