<div class="sites-page">
  <header class="page-header">
    <div>
      <h1 class="page-title">Scraping Sites</h1>
      <p class="page-subtitle">Configure source websites, extraction modes, and CSS selectors for scraping jobs.</p>
    </div>
    <button class="btn btn-primary btn-sm" (click)="onShowCreateForm()">+ New Site</button>
  </header>

  <div class="card">
    @if (loading()) {
      <div class="state-loading">
        <span class="state-spinner"></span>
        <span>Loading sites…</span>
      </div>
    } @else {
      <app-site-list [sites]="sites()" (edit)="onEditSite($event)" (delete)="onDeleteSite($event)" (reactivate)="onReactivateSite($event)" (addSite)="onShowCreateForm()" />
    }
  </div>

  <app-dialog [open]="showForm()" [title]="dialogTitle()" size="lg" (closed)="onFormCancel()">
    <app-site-form [site]="editingSite()" (success)="onFormSuccess()" (cancel)="onFormCancel()" />
  </app-dialog>
</div>
