<header class="header">
  <div class="logo">
    <span class="logo-icon"></span>
    <div class="logo-text">
      <span class="logo-title">MVP Scraper</span>
      <span class="logo-subtitle">Real Estate Data Platform</span>
    </div>
  </div>
  <div class="status">
    <div 
      class="status-indicator" 
      [class.online]="isHealthy()"
      [class.offline]="!isHealthy()"
    >
      <span class="status-dot"></span>
      <span class="status-text">{{ healthText() }}</span>
    </div>
  </div>
</header>

<nav class="nav">
  <div class="nav-items">
    @for (item of navItems; track item.path) {
      <a
        [routerLink]="item.path"
        routerLinkActive="active"
        class="nav-link"
      >
        <span class="nav-icon">{{ item.icon }}</span>
        <span class="nav-label">{{ item.label }}</span>
      </a>
    }
  </div>
</nav>
