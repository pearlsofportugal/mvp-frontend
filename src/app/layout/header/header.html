<header class="header">
  <div class="logo">
    <span class="logo-icon"></span>
    <div class="logo-text">
      <span class="logo-title">MVP Scraper</span>
      <span class="logo-subtitle">Real Estate Data Platform</span>
    </div>
  </div>
  <div class="header-right">
    <div
      class="status-indicator"
      [class.online]="isHealthy()"
      [class.offline]="!isHealthy()"
    >
      <span class="status-dot"></span>
      <span class="status-text">{{ healthText() }}</span>
    </div>
    <button class="theme-toggle" (click)="themeService.toggle()" [title]="themeService.isDark() ? 'Switch to light mode' : 'Switch to dark mode'" type="button">
      @if (themeService.isDark()) {
        <!-- Sun icon -->
        <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="12" cy="12" r="4"/>
          <path d="M12 2v2M12 20v2M4.93 4.93l1.41 1.41M17.66 17.66l1.41 1.41M2 12h2M20 12h2M6.34 17.66l-1.41 1.41M19.07 4.93l-1.41 1.41"/>
        </svg>
      } @else {
        <!-- Moon icon -->
        <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>
        </svg>
      }
    </button>
  </div>
</header>

<nav class="nav">
  <div class="nav-items">
    @for (item of navItems; track item.path) {
      <a
        [routerLink]="item.path"
        routerLinkActive="active"
        class="nav-link"
      >
        <!-- <span class="nav-icon">{{ item.icon }}</span> -->
        <span class="nav-label">{{ item.label }}</span>
      </a>
    }
  </div>
</nav>
